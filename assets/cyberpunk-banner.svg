<svg width="1600" height="320" viewBox="0 0 1600 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#120021"/>
      <stop offset="100%" stop-color="#04010d"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#ff2fe3"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="320" fill="url(#sky)"/>
  <g opacity="0.4" stroke="url(#neon)">
    <path d="M0 280H1600"/>
    <path d="M0 240H1600"/>
    <path d="M0 200H1600"/>
    <path d="M0 160H1600"/>
  </g>

  <g filter="url(#glow)">
    <rect x="70" y="120" width="120" height="130" fill="#10001E" stroke="url(#neon)"/>
    <rect x="220" y="80" width="170" height="170" fill="#0f0520" stroke="url(#neon)"/>
    <rect x="420" y="95" width="130" height="155" fill="#0f0520" stroke="url(#neon)"/>
    <rect x="590" y="70" width="220" height="180" fill="#10001E" stroke="url(#neon)"/>
    <rect x="840" y="100" width="130" height="150" fill="#0f0520" stroke="url(#neon)"/>
    <rect x="1010" y="65" width="190" height="185" fill="#10001E" stroke="url(#neon)"/>
    <rect x="1240" y="110" width="130" height="140" fill="#0f0520" stroke="url(#neon)"/>
    <rect x="1390" y="88" width="120" height="162" fill="#10001E" stroke="url(#neon)"/>
  </g>

  <g filter="url(#glow)" stroke="#00f0ff" opacity="0.8">
    <path d="M0 265C240 220 340 300 500 245C700 175 900 280 1120 220C1330 160 1480 220 1600 170"/>
  </g>
